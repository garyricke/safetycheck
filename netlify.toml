# Netlify configuration — SafetyCheck Inc. client training portal
[build]
  publish = "."

# ── Access gate: Martam training ─────────────────────────────────────────────
# Password-protects the Martam training area using the SITE_PASSWORD environment
# variable (Netlify → Site settings → Environment variables). Password only, no
# username. The password itself is never committed to this repo.
#
# WHILE IN REVIEW (current): the whole /martam/* area is gated.
[[edge_functions]]
  path = "/martam/*"
  function = "gate"

# ── Access gate: Partner / SafetyCheck pitch kit ─────────────────────────────
# Separate, independently-passworded area for the Orbis × SafetyCheck program
# kit (budget model, landing page, library, estimates). Reads its own
# PARTNER_PASSWORD env var so it can differ from the training password.
[[edge_functions]]
  path = "/partner/*"
  function = "gate-partner"

# ── Going live (Martam) ──────────────────────────────────────────────────────
# To make the training page public but keep the internal docs protected,
# comment out the /martam/* block above and uncomment the block below.
#
# [[edge_functions]]
#   path = "/martam/*"
